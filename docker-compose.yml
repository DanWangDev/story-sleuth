services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: story_sleuth
      POSTGRES_PASSWORD: story_sleuth
      POSTGRES_DB: story_sleuth
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U story_sleuth -d story_sleuth"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    ports:
      - "5060:5060"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=5060
      - DATABASE_URL=postgres://story_sleuth:story_sleuth@postgres:5432/story_sleuth
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5065}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
      args:
        VITE_API_URL: /api
        VITE_HUB_URL: ${VITE_HUB_URL:-http://localhost:3009}
    ports:
      - "5065:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres-data:
