services:
  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    ports:
      - "5060:5060"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=5060
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5065}
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
      args:
        VITE_API_URL: /api
        VITE_HUB_URL: ${VITE_HUB_URL:-http://localhost:3009}
    ports:
      - "5065:80"
    depends_on:
      - backend
    restart: unless-stopped
